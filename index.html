<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVMadrid Live - البث المباشر</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --madrid-blue: #001c58; --madrid-gold: #febe10; --bg: #0a0e27; --card: #161b3d; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; }
        
        /* مشغل الفيديو المثبت */
        #player-wrapper { position: sticky; top: 0; z-index: 100; background: #000; width: 100%; aspect-ratio: 16/9; border-bottom: 2px solid var(--madrid-gold); display: none; }
        video { width: 100%; height: 100%; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .header { text-align: center; padding: 15px; background: var(--madrid-blue); color: white; font-weight: bold; }
        
        .search-box { width: 100%; padding: 12px; border-radius: 25px; border: 1px solid #2d3a4f; background: var(--card); color: white; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .match-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid transparent; cursor: pointer; transition: 0.3s; }
        .match-card:hover { border-color: var(--madrid-gold); }
        
        .match-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--madrid-gold); margin-bottom: 10px; }
        .teams { display: flex; justify-content: space-around; align-items: center; text-align: center; }
        .team img { width: 45px; height: 45px; object-fit: contain; }
        .vs { font-weight: bold; font-size: 18px; }
        .live-btn { background: #e11d48; color: white; border: none; padding: 8px 15px; border-radius: 20px; width: 100%; margin-top: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div id="player-wrapper">
    <video id="video" controls autoplay></video>
</div>
<div class="header">TVMADRID.COM - مركز التأسيس</div>
<div class="container">
    <input type = "text" class = "search-box" id = "matchSearch" placeholder = "ابحث عن تطابق أو قناة...">
    <div class="match-card" onclick="startPlay('https://static.france24.com/live/F24_AR_LO_HLS/live_tv.m3u8')">
        <div class="match-info">
            <span>قناة تريدية (تجربة)</span>
            <span style="color: #22c55e;">● مباشر الآن</span>
        </div>
        <div class="teams">
            <div class="team">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/France_24_logo_ar.png" alt="اختبار">
                <div>الربعس 24</div>
            </div>
            <div class="vs">مباشر</div>
            <div class="team">
                <img src="https://logodownload.org/wp-content/uploads/2016/03/real-madrid-logo-0.png" alt="مدريد">
                <div>TVMadrid</div>
            </div>
        </div>
        <button class="live-btn">اضغط بث مباشر</button>
    </div>
    <div class="match-card" onclick="alert('هذه العملية لم تبدأ بعد، حيث تم وضع الرابط قبل الانطلاق بـ 15 دقيقة')">
        <div class="match-info">
            <span>الدوري الإسباني</span>
            <span style="color: #94a3b8;">اليوم - 21:00</span>
        </div>
        <div class="teams">
            <div class="team">
                <img src="https://logodownload.org/wp-content/uploads/2016/03/real-madrid-logo-0.png" alt="ريال مدريد">
                <div>ريال مدريد</div>
            </div>
            <div class="vs">مقابل</div>
            <div class="team">
                <img src="https://logodownload.org/wp-content/uploads/2016/03/barcelona-logo-0.png" alt="برشلونة">
                <div>برشلانة</div>
            </div>
        </div>
        <p style="text-align: center;font-size: 11px; color: #64748b; Margin-top: 10px;">انتظر عملية تفعيل البث</p>
    </div>
</div>
<script>
    دالة بدء التشغيل (عنوان URL) {
        const video = document.getElementById('video');
        const wrapper = document.getElementById('player-wrapper');
        wrapper.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
        إذا كان (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play();
        }
    }
    // علم
    document.getElementById('matchSearch').addEventListener('keyup', function() {
        let filter = this.value.toLowerCase();
        let cards = document.querySelectorAll('.match-card');
        cards.forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(filter) ? "block" : "none";
        });
    });
</script>
</body>
</html>
